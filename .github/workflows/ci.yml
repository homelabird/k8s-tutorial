          outside_status_all_output="$(bash scripts/verify/run-review-batch-checks.sh --status-all)"
          grep -Eq '^OUTSIDE-BATCHES \| readiness=needs-batching \| reason=outside-batch-changes-present \| total=1 \| tracked-modified=0 \| untracked=1$' <<<"${outside_status_all_output}"
          grep -Eq '^FIRST-ACTION \| batch=outside-batches \| readiness=needs-batching \| reason=outside-batch-changes-present \| next=\./scripts/verify/run-review-batch-checks\.sh --outside-landing-batches --show$' <<<"${outside_status_all_output}"
          grep -Eq '^HANDOFF \| complete=5 \| pending-artifact=0 \| direct-review=0 \| pending-run=0 \| blocked=0 \| next=\./scripts/verify/run-review-batch-checks\.sh --outside-landing-batches --show$' <<<"${outside_status_all_output}"
          grep -Eq '^VERDICT \| readiness=needs-batching \| reason=outside-batch-changes-present \| ready=5 \| needs-landing=0 \| blocked=0$' <<<"${outside_status_all_output}"
          outside_next_output="$(bash scripts/verify/run-review-batch-checks.sh --next)"
          grep -Eq '^\./scripts/verify/run-review-batch-checks\.sh --outside-landing-batches --show$' <<<"${outside_next_output}"
          outside_next_verbose_output="$(bash scripts/verify/run-review-batch-checks.sh --next --verbose)"
          grep -Eq '^NEXT \| batch=outside-batches \| readiness=needs-batching \| reason=outside-batch-changes-present \| total=1 \| tracked-modified=0 \| untracked=1 \| missing=0 \| focus=scripts/verify/\.review-batch-ci-outside\.tmp \| next=\./scripts/verify/run-review-batch-checks\.sh --outside-landing-batches --show$' <<<"${outside_next_verbose_output}"
          rm -f "${outside_file}"

